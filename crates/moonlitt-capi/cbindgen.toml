# cbindgen configuration — generates include/moonlitt.h from this crate.
#
# Regenerate (from the workspace root):
#   cbindgen --config crates/moonlitt-capi/cbindgen.toml \
#            --crate moonlitt-capi --output include/moonlitt.h
#
# CI fails when the committed header drifts from the source.

language = "C"
include_guard = "MOONLITT_H"
header = """/* moonlitt — headless DAW engine.
 * C API, ABI draft 0.9 (frozen surface lands as 1.0).
 *
 * Conventions:
 *   - Fallible functions return MoonlittStatus: 0 = MOONLITT_OK,
 *     negative = MOONLITT_ERR_* class. The human-readable detail for the
 *     most recent failure on the calling thread comes from
 *     moonlitt_last_error_message() (borrowed pointer — do NOT free).
 *   - Functions documented as returning owned strings/buffers must be
 *     freed with moonlitt_free_string (strings).
 *   - Out-of-range arguments are rejected, never clamped.
 *   - One control thread per handle; the audio thread is internal.
 */"""
autogen_warning = "/* Generated by cbindgen — do not edit by hand; edit crates/moonlitt-capi/src and regenerate. */"
documentation = true
documentation_style = "doxy"
cpp_compat = true
usize_is_size_t = true

[parse]
parse_deps = false

[fn]
sort_by = "None"
